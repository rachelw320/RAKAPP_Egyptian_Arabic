[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  GIT_LFS_ENABLED = "false"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
